# TMG RFP Analyzer — Intake Dispatch Workflow
# Triggered by Cloudflare intake Worker via repository dispatch API
# Event type: rfp-submission
#
# Payload from Worker:
#   submissionId  — unique submission identifier
#   company       — submitting company name
#   contact       — contact person name
#   email         — contact email
#   procurementType — procurement type slug (us-federal, intl-dev, other)
#   r2Key         — R2 object key for the PDF e.g. rfp-pdfs/sub_123/filename.pdf
#   rfpFileName   — original PDF filename
#   submittedAt   — ISO timestamp
#   naics         — comma-separated NAICS codes
#   certifications — comma-separated certifications/socioeconomic statuses
#   contractVehicles — comma-separated contract vehicles
#   donor         — donor/funder name for international development submissions
#   sector        — sector/thematic area for international development submissions
#   managingContractor — managing contractor for international development submissions
#   pastPerformance — short past performance summary
#   teamSize      — team size band from intake form
#   keyPersonnel  — key personnel summary from intake form

name: RFP Intake Dispatch

on:
  workflow_dispatch:
    inputs:
      submissionId:
        description: "Unique submission identifier"
        required: true
        type: string
      company:
        description: "Submitting company name"
        required: true
        type: string
      contact:
        description: "Contact person name"
        required: true
        type: string
      email:
        description: "Contact email"
        required: true
        type: string
      procurementType:
        description: "Procurement type (us-federal, intl-dev, other)"
        required: false
        type: string
      r2Key:
        description: "R2 object key, e.g. rfp-pdfs/sub_123/filename.pdf"
        required: true
        type: string
      rfpFileName:
        description: "Original PDF filename"
        required: true
        type: string
      submittedAt:
        description: "ISO timestamp"
        required: true
        type: string
      naics:
        description: "NAICS codes from intake"
        required: false
        type: string
      certifications:
        description: "Certifications from intake"
        required: false
        type: string
      contractVehicles:
        description: "Contract vehicles from intake"
        required: false
        type: string
      donor:
        description: "Donor/funder for international development"
        required: false
        type: string
      sector:
        description: "Sector or thematic area for international development"
        required: false
        type: string
      managingContractor:
        description: "Managing contractor for international development"
        required: false
        type: string
      pastPerformance:
        description: "Past performance summary from intake"
        required: false
        type: string
      teamSize:
        description: "Team size band from intake"
        required: false
        type: string
      keyPersonnel:
        description: "Key personnel summary from intake"
        required: false
        type: string
      capabilityText:
        description: "Extracted capability statement text"
        required: false
        type: string
      capabilityFileName:
        description: "Capability statement filename"
        required: false
        type: string
      supportingDocText:
        description: "Extracted supporting document text"
        required: false
        type: string
      supportingDocFileName:
        description: "Supporting document filename"
        required: false
        type: string
  repository_dispatch:
    types: [rfp-submission]

jobs:
  process-intake:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── STEP 1: Log incoming submission ───────────────────────────────────
      - name: Log submission details
        run: |
          echo "## RFP Submission Received" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Submission ID | ${{ github.event.client_payload.submissionId || github.event.inputs.submissionId }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Company | ${{ github.event.client_payload.submitter.company || github.event.inputs.company }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Contact | ${{ github.event.client_payload.submitter.contact || github.event.inputs.contact }} |" >> $GITHUB_STEP_SUMMARY
          echo "| RFP File | ${{ github.event.client_payload.rfpFileName || github.event.inputs.rfpFileName }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Capability Statement File | ${{ github.event.client_payload.documents.capabilityFileName || github.event.inputs.capabilityFileName || 'Not provided' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Supporting Document File | ${{ github.event.client_payload.documents.supportingDocFileName || github.event.inputs.supportingDocFileName || 'Not provided' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Submitted | ${{ github.event.client_payload.submittedAt || github.event.inputs.submittedAt }} |" >> $GITHUB_STEP_SUMMARY

      # ── STEP 2: Checkout repository ───────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RFP_PIPELINE_PAT }}

      # ── STEP 3: Install AWS CLI for R2 download ───────────────────────────
      - name: Install AWS CLI
        run: |
          pip install awscli --quiet

      # ── STEP 4: Download PDF from Cloudflare R2 ───────────────────────────
      - name: Download RFP PDF from R2
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID:         ${{ secrets.R2_ACCOUNT_ID }}
          R2_BUCKET_NAME:        ${{ secrets.R2_BUCKET_NAME }}
          R2_KEY:                ${{ github.event.client_payload.r2Key || github.event.inputs.r2Key }}
          RFP_FILENAME:          ${{ github.event.client_payload.rfpFileName || github.event.inputs.rfpFileName }}
          SUBMISSION_ID:         ${{ github.event.client_payload.submissionId || github.event.inputs.submissionId }}
        run: |
          # R2 S3-compatible endpoint
          R2_ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          # Create destination directory using submission ID as subfolder
          DEST_DIR="rfp-pdfs/${SUBMISSION_ID}"
          mkdir -p "${DEST_DIR}"

          echo "Downloading: ${R2_KEY}"
          echo "Destination: ${DEST_DIR}/${RFP_FILENAME}"

          aws s3api get-object \
            --bucket "${R2_BUCKET_NAME}" \
            --key "${R2_KEY}" \
            "${DEST_DIR}/${RFP_FILENAME}" \
            --endpoint-url "${R2_ENDPOINT}" \
            --region us-east-1 || {
              echo "Primary fetch failed for key: ${R2_KEY}"
              echo "Listing nearby objects for troubleshooting..."
              aws s3api list-objects-v2 \
                --bucket "${R2_BUCKET_NAME}" \
                --prefix "rfp-pdfs/${SUBMISSION_ID}/" \
                --max-items 20 \
                --endpoint-url "${R2_ENDPOINT}" \
                --region us-east-1
              exit 1
            }

          echo "Download complete."
          ls -lh "${DEST_DIR}/"

      # ── STEP 5: Validate downloaded file ──────────────────────────────────
      - name: Validate PDF file
        env:
          RFP_FILENAME: ${{ github.event.client_payload.rfpFileName || github.event.inputs.rfpFileName }}
          SUBMISSION_ID: ${{ github.event.client_payload.submissionId || github.event.inputs.submissionId }}
        run: |
          DEST_PATH="rfp-pdfs/${SUBMISSION_ID}/${RFP_FILENAME}"

          if [ ! -f "${DEST_PATH}" ]; then
            echo "ERROR: PDF file not found at ${DEST_PATH}"
            exit 1
          fi

          FILE_SIZE=$(stat -c%s "${DEST_PATH}" 2>/dev/null || stat -f%z "${DEST_PATH}")
          if [ "${FILE_SIZE}" -lt 1000 ]; then
            echo "ERROR: PDF file appears empty or corrupt (${FILE_SIZE} bytes)"
            exit 1
          fi

          echo "PDF validated: ${DEST_PATH} (${FILE_SIZE} bytes)"
          echo "PDF_PATH=${DEST_PATH}" >> $GITHUB_ENV

      # ── STEP 6: Write submission metadata file ────────────────────────────
      - name: Write submission metadata
        env:
          SUBMISSION_ID:  ${{ github.event.client_payload.submissionId || github.event.inputs.submissionId }}
          COMPANY:        ${{ github.event.client_payload.submitter.company || github.event.inputs.company }}
          CONTACT:        ${{ github.event.client_payload.submitter.contact || github.event.inputs.contact }}
          EMAIL:          ${{ github.event.client_payload.submitter.email || github.event.inputs.email }}
          PROCUREMENT_TYPE: ${{ github.event.client_payload.procurementType || github.event.inputs.procurementType }}
          RFP_FILENAME:   ${{ github.event.client_payload.rfpFileName || github.event.inputs.rfpFileName }}
          SUBMITTED_AT:   ${{ github.event.client_payload.submittedAt || github.event.inputs.submittedAt }}
          NAICS:          ${{ github.event.client_payload.profile.naics || github.event.inputs.naics }}
          CERTIFICATIONS: ${{ github.event.client_payload.profile.certifications || github.event.inputs.certifications }}
          CONTRACT_VEHICLES: ${{ github.event.client_payload.profile.contractVehicles || github.event.inputs.contractVehicles }}
          DONOR:          ${{ github.event.client_payload.profile.donor || github.event.inputs.donor }}
          SECTOR:         ${{ github.event.client_payload.profile.sector || github.event.inputs.sector }}
          MANAGING_CONTRACTOR: ${{ github.event.client_payload.profile.managingContractor || github.event.inputs.managingContractor }}
          PAST_PERFORMANCE: ${{ github.event.client_payload.profile.pastPerformance || github.event.inputs.pastPerformance }}
          TEAM_SIZE:      ${{ github.event.client_payload.profile.teamSize || github.event.inputs.teamSize }}
          KEY_PERSONNEL:  ${{ github.event.client_payload.profile.keyPersonnel || github.event.inputs.keyPersonnel }}
          CAPABILITY_TEXT: ${{ github.event.client_payload.documents.capabilityText || github.event.inputs.capabilityText }}
          CAPABILITY_FILENAME: ${{ github.event.client_payload.documents.capabilityFileName || github.event.inputs.capabilityFileName }}
          SUPPORTING_DOC_TEXT: ${{ github.event.client_payload.documents.supportingDocText || github.event.inputs.supportingDocText }}
          SUPPORTING_DOC_FILENAME: ${{ github.event.client_payload.documents.supportingDocFileName || github.event.inputs.supportingDocFileName }}
        run: |
          DEST_DIR="rfp-pdfs/${SUBMISSION_ID}"
          METADATA_PATH="${DEST_DIR}/submission-metadata.json"

          cat > "${METADATA_PATH}" << EOF
          {
            "submissionId":  "${SUBMISSION_ID}",
            "company":       "${COMPANY}",
            "contact":       "${CONTACT}",
            "email":         "${EMAIL}",
            "procurementType": "${PROCUREMENT_TYPE}",
            "rfpFileName":   "${RFP_FILENAME}",
            "submittedAt":   "${SUBMITTED_AT}",
            "naics":         "${NAICS}",
            "certifications": "${CERTIFICATIONS}",
            "contractVehicles": "${CONTRACT_VEHICLES}",
            "donor":         "${DONOR}",
            "sector":        "${SECTOR}",
            "managingContractor": "${MANAGING_CONTRACTOR}",
            "pastPerformance": "${PAST_PERFORMANCE}",
            "teamSize":      "${TEAM_SIZE}",
            "keyPersonnel":  "${KEY_PERSONNEL}",
            "workflowRunId": "${GITHUB_RUN_ID}"
          }
          EOF

          echo "Metadata written to ${METADATA_PATH}"
          cat "${METADATA_PATH}"

          COMPANY_PROFILE_PATH="${DEST_DIR}/company-profile.md"
          CAPABILITY_BODY="${CAPABILITY_TEXT}"
          DONOR_VALUE="${DONOR}"
          SECTOR_VALUE="${SECTOR}"
          MANAGING_CONTRACTOR_VALUE="${MANAGING_CONTRACTOR}"

          if [ -z "${CAPABILITY_BODY}" ]; then
            CAPABILITY_BODY="Not provided"
          fi
          if [ -z "${DONOR_VALUE}" ]; then
            DONOR_VALUE="Not provided"
          fi
          if [ -z "${SECTOR_VALUE}" ]; then
            SECTOR_VALUE="Not provided"
          fi
          if [ -z "${MANAGING_CONTRACTOR_VALUE}" ]; then
            MANAGING_CONTRACTOR_VALUE="Not provided"
          fi

          PROCUREMENT_TYPE_SLUG="${PROCUREMENT_TYPE}"
          if [ -z "${PROCUREMENT_TYPE_SLUG}" ]; then
            PROCUREMENT_TYPE_SLUG="us-federal"
          fi

          case "${PROCUREMENT_TYPE_SLUG}" in
            us-federal)
              PROCUREMENT_TYPE_LABEL="US Federal RFP (FAR-based)"
              ;;
            intl-dev)
              PROCUREMENT_TYPE_LABEL="International Development"
              ;;
            other)
              PROCUREMENT_TYPE_LABEL="Other / Commercial"
              ;;
            *)
              PROCUREMENT_TYPE_LABEL="US Federal RFP (FAR-based)"
              PROCUREMENT_TYPE_SLUG="us-federal"
              ;;
          esac

          cat > "${COMPANY_PROFILE_PATH}" << EOF
          # Submitted Company Profile
          **Procurement Type:** ${PROCUREMENT_TYPE_LABEL}

          ## Company Name
          ${COMPANY}

          ## Contact Name
          ${CONTACT}

          ## Contact Email
          ${EMAIL}

          EOF

          if [ "${PROCUREMENT_TYPE_SLUG}" = "intl-dev" ]; then
            cat >> "${COMPANY_PROFILE_PATH}" << EOF

          ## Donor / Funder
          ${DONOR_VALUE}

          ## Sector / Thematic Area
          ${SECTOR_VALUE}

          ## Managing Contractor
          ${MANAGING_CONTRACTOR_VALUE}
          EOF
          else
            cat >> "${COMPANY_PROFILE_PATH}" << EOF

          ## NAICS Codes
          ${NAICS}

          ## Certifications
          ${CERTIFICATIONS}

          ## Contract Vehicles
          ${CONTRACT_VEHICLES}
          EOF
          fi

          cat >> "${COMPANY_PROFILE_PATH}" << EOF

          ## Past Performance Summary
          ${PAST_PERFORMANCE}

          ## Team Size
          ${TEAM_SIZE}

          ## Key Personnel
          ${KEY_PERSONNEL}

          ## Capability Statement
          ${CAPABILITY_BODY}
          EOF

          if [ -n "${SUPPORTING_DOC_TEXT}" ]; then
            SUPPORTING_HEADER_FILENAME="${SUPPORTING_DOC_FILENAME}"
            if [ -z "${SUPPORTING_HEADER_FILENAME}" ]; then
              SUPPORTING_HEADER_FILENAME="Document"
            fi
            {
              echo ""
              echo "## Supporting Document — ${SUPPORTING_HEADER_FILENAME}"
              echo "${SUPPORTING_DOC_TEXT}"
            } >> "${COMPANY_PROFILE_PATH}"
          fi

          echo "Company profile written to ${COMPANY_PROFILE_PATH}"

      # ── STEP 7: Commit PDF and metadata to trigger conversion pipeline ─────
      - name: Commit PDF to rfp-pdfs/
        env:
          SUBMISSION_ID: ${{ github.event.client_payload.submissionId || github.event.inputs.submissionId }}
          COMPANY:       ${{ github.event.client_payload.submitter.company || github.event.inputs.company }}
          RFP_FILENAME:  ${{ github.event.client_payload.rfpFileName || github.event.inputs.rfpFileName }}
          RFP_PIPELINE_PAT: ${{ secrets.RFP_PIPELINE_PAT }}
        run: |
          if [ -z "${RFP_PIPELINE_PAT}" ]; then
            echo "ERROR: secrets.RFP_PIPELINE_PAT is not configured."
            echo "A PAT is required so this push can trigger downstream workflows."
            exit 1
          fi

          git config user.name  "TMG RFP Analyzer"
          git config user.email "actions@github.com"

          git add "rfp-pdfs/${SUBMISSION_ID}/"

          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit — file may already exist."
          else
            git commit -m "intake: ${COMPANY} — ${RFP_FILENAME} [${SUBMISSION_ID}]"
            git push
            echo "Committed and pushed. Conversion pipeline will trigger automatically."
          fi

      # ── STEP 8: Update workflow summary ───────────────────────────────────
      - name: Update run summary
        if: always()
        env:
          SUBMISSION_ID: ${{ github.event.client_payload.submissionId || github.event.inputs.submissionId }}
          COMPANY:       ${{ github.event.client_payload.submitter.company || github.event.inputs.company }}
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Pipeline Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "PDF committed to \`rfp-pdfs/${SUBMISSION_ID}/\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Conversion workflow will trigger automatically on push to \`rfp-pdfs/**/*.pdf\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Next step: monitor the **Convert RFP PDF to Markdown** workflow run for ${COMPANY}" >> $GITHUB_STEP_SUMMARY