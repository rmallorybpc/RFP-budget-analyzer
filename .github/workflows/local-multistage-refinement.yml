name: local-multistage-refinement

on:
  push:
    paths:
      - rfp-markdown/generated/**/*.md
      - '!rfp-markdown/generated/**/*-final*.md'
      - '!rfp-markdown/audit/**'
      - prompts/**
      - src/**
      - .github/workflows/local-multistage-refinement.yml
  workflow_run:
    workflows:
      - convert-rfp-pdf-to-markdown
    types:
      - completed
  workflow_dispatch:
    inputs:
      file_path:
        description: Optional markdown path to process
        required: false
        type: string
      uploads_glob:
        description: Optional additional markdown glob for manual runs
        required: false
        type: string

permissions:
  contents: write
  models: read

jobs:
  refine:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      ENABLE_GITHUB_MODELS_CLAUDE: "true"
      GITHUB_MODELS_CLAUDE_MODEL: anthropic/claude-sonnet-4.5
      GITHUB_MODELS_ENDPOINT: https://models.github.ai/inference/chat/completions
      MAX_REFINEMENT_RETRIES: "1"
      STAGE_E_MAX_INPUT_TOKENS: "100000"
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Ensure output directories
        run: |
          set -euo pipefail
          mkdir -p rfp-markdown/generated
          mkdir -p rfp-markdown/audit
          mkdir -p .tmp

      - name: Resolve targets
        id: prep
        run: |
          set -euo pipefail
          : > .tmp/targets.txt

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.file_path }}" ]]; then
              echo "${{ inputs.file_path }}" >> .tmp/targets.txt
            elif [[ -n "${{ inputs.uploads_glob }}" ]]; then
              compgen -G "${{ inputs.uploads_glob }}" >> .tmp/targets.txt || true
            else
              echo "workflow_dispatch called without file_path or uploads_glob; no targets selected." >&2
            fi
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            # On push, process only converted markdown files under rfp-markdown/generated/.
            before="${{ github.event.before }}"
            after="${{ github.sha }}"

            if [[ "$before" =~ ^0+$ ]]; then
              git show --pretty='' --name-status "$after" > .tmp/diff.txt || true
            else
              git diff --name-status "$before" "$after" > .tmp/diff.txt || true
            fi

            while IFS=$'\t' read -r status path target_path; do
              [[ -z "${status:-}" ]] && continue
              [[ "$status" == D ]] && continue

              if [[ "$status" == R* ]]; then
                path="$target_path"
              fi

                if [[ "$path" =~ ^rfp-markdown/generated/.+\.md$ ]] && \
                  [[ ! "$path" =~ -final[^/]*\.md$ ]]; then
                echo "$path"
              fi
            done < .tmp/diff.txt | sort -u >> .tmp/targets.txt || true
          elif [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            # For chained runs, compare the original trigger SHA to current HEAD.
            # The conversion workflow may create a follow-up commit with markdown updates.
            head_sha="${{ github.event.workflow_run.head_sha }}"
            if [[ -n "$head_sha" ]]; then
              git diff --name-status "$head_sha" HEAD > .tmp/diff.txt || true
            else
              git show --pretty='' --name-status HEAD > .tmp/diff.txt || true
            fi

            while IFS=$'\t' read -r status path target_path; do
              [[ -z "${status:-}" ]] && continue
              [[ "$status" == D ]] && continue

              if [[ "$status" == R* ]]; then
                path="$target_path"
              fi

                if [[ "$path" =~ ^rfp-markdown/generated/.+\.md$ ]] && \
                  [[ ! "$path" =~ -final[^/]*\.md$ ]]; then
                echo "$path"
              fi
            done < .tmp/diff.txt | sort -u >> .tmp/targets.txt || true
          fi

          sort -u .tmp/targets.txt -o .tmp/targets.txt || true
          grep -E '^rfp-markdown/.+\.md$' .tmp/targets.txt > .tmp/targets.filtered.txt || true
          mv .tmp/targets.filtered.txt .tmp/targets.txt || true

          run_dir="rfp-markdown/audit/${{ github.run_id }}-${{ github.run_attempt }}"
          mkdir -p "$run_dir"
          echo "run_dir=$run_dir" >> "$GITHUB_OUTPUT"

          target_count="$(wc -l < .tmp/targets.txt | tr -d ' ')"
          echo "target_count=$target_count" >> "$GITHUB_OUTPUT"

          context_file="$run_dir/knowledge-context.md"
          : > "$context_file"
          if [[ -d knowledge/rfp ]]; then
            echo "# knowledge/rfp" >> "$context_file"
            while IFS= read -r f; do
              echo "" >> "$context_file"
              echo "## $f" >> "$context_file"
              cat "$f" >> "$context_file"
            done < <(find knowledge/rfp -type f -name '*.md' | sort)
          fi
          if [[ -d knowledge/formatting ]]; then
            echo "" >> "$context_file"
            echo "# knowledge/formatting" >> "$context_file"
            while IFS= read -r f; do
              echo "" >> "$context_file"
              echo "## $f" >> "$context_file"
              cat "$f" >> "$context_file"
            done < <(find knowledge/formatting -type f -name '*.md' | sort)
          fi

          # Assets are preprocessed in a dedicated cache step and appended to this context file.

      - name: Detect procurement type from markdown and submission context
        if: steps.prep.outputs.target_count != '0'
        run: |
          set -euo pipefail

          detect_procurement_type_for_file() {
            local in_file="$1"
            local comment_type=""
            local profile_type=""
            local metadata_type=""

            if [[ ! -f "$in_file" ]]; then
              echo "us-federal"
              return 0
            fi

            comment_type="$(head -n 5 "$in_file" | sed -n 's/^[[:space:]]*<!-- procurement-type: \(.*\) -->[[:space:]]*$/\1/p' | head -n 1 | tr '[:upper:]' '[:lower:]' | xargs)"
            if [[ "$comment_type" != "us-federal" && "$comment_type" != "intl-dev" && "$comment_type" != "other" ]]; then
              comment_type=""
            fi

            profile_line="$(grep -im1 '^\*\*Procurement Type:\*\*' "$in_file" || true)"
            profile_value="$(printf '%s\n' "$profile_line" | sed -E 's/^\*\*Procurement Type:\*\*[[:space:]]*//I' | tr '[:upper:]' '[:lower:]' | xargs)"
            case "$profile_value" in
              *international*development*|*intl*dev*)
                profile_type="intl-dev"
                ;;
              *us*federal*|*far*)
                profile_type="us-federal"
                ;;
              *other*|*commercial*)
                profile_type="other"
                ;;
            esac

            if [[ "$in_file" =~ /sub_[0-9]+/ ]]; then
              submission_id="$(printf '%s' "$in_file" | sed -n 's|.*\(sub_[0-9][0-9]*\).*|\1|p' | head -n 1)"
              metadata_file="rfp-pdfs/${submission_id}/submission-metadata.json"
              if [[ -f "$metadata_file" ]]; then
                metadata_type="$(jq -r '.procurementType // ""' "$metadata_file" 2>/dev/null | tr '[:upper:]' '[:lower:]' | xargs)"
                if [[ "$metadata_type" != "us-federal" && "$metadata_type" != "intl-dev" && "$metadata_type" != "other" ]]; then
                  metadata_type=""
                fi
              fi
            fi

            if [[ "$profile_type" == "intl-dev" || "$metadata_type" == "intl-dev" ]]; then
              echo "intl-dev"
            elif [[ -n "$profile_type" ]]; then
              echo "$profile_type"
            elif [[ -n "$comment_type" ]]; then
              echo "$comment_type"
            elif [[ -n "$metadata_type" ]]; then
              echo "$metadata_type"
            else
              echo "us-federal"
            fi
          }

          target_file="$(head -n 1 .tmp/targets.txt || true)"
          procurement_type="us-federal"

          if [[ -n "$target_file" && -f "$target_file" ]]; then
            procurement_type="$(detect_procurement_type_for_file "$target_file")"
          fi

          echo "PROCUREMENT_TYPE=$procurement_type" >> "$GITHUB_ENV"
          echo "Detected PROCUREMENT_TYPE=$procurement_type from ${target_file:-no-target}" >> "$GITHUB_STEP_SUMMARY"

      - name: Install Python dependencies for markdown analysis
        if: steps.prep.outputs.target_count != '0'
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Cache assets references for analysis context
        if: steps.prep.outputs.target_count != '0'
        run: |
          set -euo pipefail
          RUN_DIR="${{ steps.prep.outputs.run_dir }}"
          CONTEXT_FILE="$RUN_DIR/knowledge-context.md"
          CACHE_DIR="$RUN_DIR/assets-cache"
          INDEX_FILE="$CACHE_DIR/assets-index.md"
          WARNINGS_FILE="$CACHE_DIR/assets-warnings.md"

          mkdir -p "$CACHE_DIR"
          : > "$INDEX_FILE"
          : > "$WARNINGS_FILE"

          if [[ ! -d assets ]]; then
            exit 0
          fi

          RUN_DIR="$RUN_DIR" CACHE_DIR="$CACHE_DIR" INDEX_FILE="$INDEX_FILE" WARNINGS_FILE="$WARNINGS_FILE" python - <<'PY'
          import os
          from pathlib import Path

          from pdf_multi_agent_analysis.assets_context import write_assets_cache

          run_dir = Path(os.environ["RUN_DIR"])
          cache_dir = Path(os.environ["CACHE_DIR"])
          index_file = Path(os.environ["INDEX_FILE"])
          warnings_file = Path(os.environ["WARNINGS_FILE"])

          entries, warnings = write_assets_cache(
            assets_dir=Path("assets"),
            cache_dir=cache_dir,
            max_chars_per_file=4000,
            pdf_ocr_fallback=True,
            pdf_ocr_max_pages=6,
            pdf_min_text_chars=100,
            pdf_max_single_char_token_ratio=0.40,
          )

          index_lines = ["# assets cache"]
          for source, cached_name in entries:
            index_lines.append(f"- {source} -> {cached_name}")
          index_file.write_text("\n".join(index_lines).strip() + "\n", encoding="utf-8")

          if warnings:
            warning_lines = [f"- WARNING: {warning}" for warning in warnings]
            warnings_file.write_text("\n".join(warning_lines).strip() + "\n", encoding="utf-8")
            for warning in warnings:
              print(f"WARNING: {warning}")
          else:
            warnings_file.write_text("", encoding="utf-8")
          PY

          {
            echo ""
            echo "# assets"
            echo ""
            cat "$INDEX_FILE"
            echo ""
          } >> "$CONTEXT_FILE"

          if [[ -s "$WARNINGS_FILE" ]]; then
            {
              echo "## asset extraction warnings"
              cat "$WARNINGS_FILE"
              echo ""
            } >> "$CONTEXT_FILE"
          fi

          while IFS= read -r cached; do
            echo "" >> "$CONTEXT_FILE"
            echo "## cached: ${cached#${RUN_DIR}/}" >> "$CONTEXT_FILE"
            cat "$cached" >> "$CONTEXT_FILE"
          done < <(find "$CACHE_DIR" -type f -name '*.txt' | sort)

      - name: Run critique, refine, formatting, and Claude cleanup stages
        if: steps.prep.outputs.target_count != '0'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RUN_DIR: ${{ steps.prep.outputs.run_dir }}
        run: |
          set -euo pipefail

          CONTEXT_FILE="$RUN_DIR/knowledge-context.md"
          LAST_SUCCESS="$CONTEXT_FILE"
          echo "$LAST_SUCCESS" > "$RUN_DIR/last-success-artifact.txt"

          transform_stage_a() {
            local in_file="$1"
            local out_file="$2"
            {
              echo "## Stage A Critique"
              echo ""
              echo "- Local deterministic review"
              echo "- Flags TODO/TBD/FIXME markers"
              echo ""
              awk '{
                if ($0 ~ /(TODO|TBD|FIXME)/) {
                  print "[FLAG] " $0
                } else {
                  print $0
                }
              }' "$in_file"
              echo ""
              echo "### Stage A Notes"
              echo "- Lines: $(wc -l < "$in_file" | tr -d ' ')"
              echo "- Flags: $(grep -Eic 'TODO|TBD|FIXME' "$in_file" || true)"
            } > "$out_file"
          }

          transform_stage_b() {
            local in_file="$1"
            local out_file="$2"
            {
              echo "## Stage B Executive Refinement"
              echo ""
              echo "### Executive Summary"
              awk 'NF > 0 { print "- " $0; c += 1; if (c >= 8) exit }' "$in_file"
              echo ""
              echo "### Refined Body"
              awk '{
                line=$0
                gsub(/^\[FLAG\][[:space:]]*/, "", line)
                print line
              }' "$in_file"
            } > "$out_file"
          }

          transform_stage_c() {
            local in_file="$1"
            local out_file="$2"
            {
              echo "## Stage C Final Markdown"
              echo ""
              awk '{
                line=$0
                gsub(/[ \t]+$/, "", line)
                print line
              }' "$in_file" | awk 'BEGIN{blank=0} {
                if ($0 == "") {
                  if (blank == 0) {
                    print ""
                  }
                  blank = 1
                } else {
                  print $0
                  blank = 0
                }
              }'
            } > "$out_file"
          }

          transform_stage_d_claude() {
            local in_file="$1"
            local out_file="$2"
            local request_file="$3"
            local raw_response_file="$4"
            local status_file="$5"
            local procurement_type="${6:-${PROCUREMENT_TYPE:-us-federal}}"
            local incomprehensible_marker="[[INCOMPREHENSIBLE_SOURCE]]"

            cp "$in_file" "$out_file"

            if [[ "${ENABLE_GITHUB_MODELS_CLAUDE:-true}" != "true" ]]; then
              printf '{"mode":"skipped","reason":"disabled via ENABLE_GITHUB_MODELS_CLAUDE"}\n' > "$request_file"
              printf '{"message":"stage D skipped; using stage C output"}\n' > "$raw_response_file"
              echo "skipped:disabled" > "$status_file"
              return 0
            fi

            if [[ -z "${GITHUB_TOKEN:-}" ]]; then
              printf '{"mode":"skipped","reason":"GITHUB_TOKEN unavailable"}\n' > "$request_file"
              printf '{"message":"stage D skipped; using stage C output"}\n' > "$raw_response_file"
              echo "skipped:no-token" > "$status_file"
              return 0
            fi

            local prompt_file="prompts/claude-cleanup.md"
            if [[ "$procurement_type" == "intl-dev" ]]; then
              prompt_file="prompts/06-intl-dev-analysis.md"
            fi

            local system_prompt
            if [[ -f "$prompt_file" ]]; then
              system_prompt="$(cat "$prompt_file")"
            else
              system_prompt="You are an RFP-markdown cleanup editor. Repair line-wrap artifacts and sentence breaks, preserve meaning, preserve markdown structure, and do not add or infer requirements."
            fi

            local model endpoint
            model="${GITHUB_MODELS_CLAUDE_MODEL:-anthropic/claude-sonnet-4.5}"
            endpoint="${GITHUB_MODELS_ENDPOINT:-https://models.github.ai/inference/chat/completions}"

            local user_payload
            if [[ "$procurement_type" == "intl-dev" ]]; then
              user_payload="Generate a complete International Development BD Opportunity Assessment from this markdown. Follow the system prompt section order exactly. Use donor-specific terminology and cross-reference the Submitted Company Profile throughout.\n\nHard exclusions for intl-dev output:\n- Do not include FAR or DFARS clause references\n- Do not include NAICS codes or size standards\n- Do not include GSA schedule rates or PWS labor categories\n- Do not include SAM.gov registration requirements\n- Do not include set-aside categories (8a, HUBZone, SDVOSB, WOSB)\n- Do not include Contract Vehicle Access as a scoring dimension\n- Do not include Certifications and Socioeconomic as a scoring dimension\n\nRequired intl-dev content:\n- Donor and funder identification (for example DFAT and RT4D)\n- Managing contractor context (for example Tetra Tech)\n- GEDSI and inclusion requirements assessment\n- Donor compliance framework assessment (for example DFAT PSEAH, Do No Harm, Child Protection)\n- Person days and budget approach using donor day-rate frameworks, not U.S. federal rate frameworks\n- Evaluation criteria from the ToR (for example Technical Soundness, Value for Money, DFAT principles)\n- Team requirements based on ToR Section XI and Annex A criteria\n\nReturn markdown only.\n\n--- BEGIN MARKDOWN ---\n$(cat \"$in_file\")\n--- END MARKDOWN ---"
            else
              user_payload="Clean and normalize this markdown. Fix mid-sentence breaks and hard wraps. Preserve headings, lists, and source intent exactly. Return markdown only. If the source is too corrupted to safely repair without guessing, return exactly [[INCOMPREHENSIBLE_SOURCE]] and nothing else.\n\n--- BEGIN MARKDOWN ---\n$(cat \"$in_file\")\n--- END MARKDOWN ---"
            fi

            jq -n \
              --arg model "$model" \
              --arg system "$system_prompt" \
              --arg user "$user_payload" \
              '{
                model: $model,
                temperature: 0.1,
                messages: [
                  {role: "system", content: $system},
                  {role: "user", content: $user}
                ]
              }' > "$request_file"

            if ! curl --silent --show-error --fail-with-body \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -X POST "$endpoint" \
              --data @"$request_file" \
              -o "$raw_response_file"; then
              echo "fallback:request-failed" > "$status_file"
              return 0
            fi

            local extracted
            extracted="$(jq -r 'if (.choices[0].message.content | type) == "string" then .choices[0].message.content else (.choices[0].message.content | map(select(type == "object") | .text // "") | join("")) end' "$raw_response_file" 2>/dev/null || true)"

            if [[ -z "${extracted//[[:space:]]/}" || "$extracted" == "null" ]]; then
              echo "fallback:empty-response" > "$status_file"
              return 0
            fi

            local normalized
            normalized="$(printf '%s' "$extracted" | tr -d '\r' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
            if [[ "$normalized" == "$incomprehensible_marker" ]]; then
              echo "incomprehensible:claude-marker" > "$status_file"
              return 0
            fi

            printf '%s\n' "$extracted" > "$out_file"
            echo "success:model=${model}" > "$status_file"
            return 0
          }

          estimate_tokens() {
            local in_file="$1"
            local chars
            chars="$(wc -m < "$in_file" | tr -d ' ')"
            echo $(((chars + 3) / 4))
          }

          detect_procurement_type_from_comment() {
            local in_file="$1"
            local comment_type=""

            if [[ ! -f "$in_file" ]]; then
              echo ""
              return 0
            fi

            comment_type="$(head -n 8 "$in_file" | sed -n 's/^[[:space:]]*<!-- procurement-type: \(.*\) -->[[:space:]]*$/\1/p' | head -n 1 | tr '[:upper:]' '[:lower:]' | xargs)"
            if [[ "$comment_type" == "us-federal" || "$comment_type" == "intl-dev" || "$comment_type" == "other" ]]; then
              echo "$comment_type"
              return 0
            fi

            echo ""
          }

          validate_stage_e_output() {
            local artifact="$1"
            local out_file="$2"

            if [[ ! -s "$out_file" ]]; then
              return 1
            fi

            local byte_count
            byte_count="$(wc -c < "$out_file" | tr -d ' ')"
            if [[ "$byte_count" -lt 180 ]]; then
              return 1
            fi

            case "$artifact" in
              analysis)
                grep -Eqi '##|analysis|opportunity|requirement|evaluation|risk' "$out_file"
                ;;
              issues)
                grep -Eqi 'issue|risk|priority|\- ' "$out_file"
                ;;
              executive-summary)
                grep -Eqi 'summary|recommendation|fit score|bid|no-bid' "$out_file"
                ;;
              scorecard)
                grep -Eqi 'score|overall|fit|dimension|\|' "$out_file"
                ;;
              *)
                return 1
                ;;
            esac
          }

          stage_e_generate_artifact() {
            local in_file="$1"
            local out_file="$2"
            local request_file="$3"
            local raw_response_file="$4"
            local procurement_type="$5"
            local artifact="$6"
            local incomprehensible_marker="[[INCOMPREHENSIBLE_SOURCE]]"

            if [[ "${ENABLE_GITHUB_MODELS_CLAUDE:-true}" != "true" ]]; then
              printf '{"mode":"skipped","reason":"disabled via ENABLE_GITHUB_MODELS_CLAUDE"}\n' > "$request_file"
              printf '{"message":"stage E skipped; deterministic output retained"}\n' > "$raw_response_file"
              echo "fallback:disabled"
              return 0
            fi

            if [[ -z "${GITHUB_TOKEN:-}" ]]; then
              printf '{"mode":"skipped","reason":"GITHUB_TOKEN unavailable"}\n' > "$request_file"
              printf '{"message":"stage E skipped; deterministic output retained"}\n' > "$raw_response_file"
              echo "fallback:no-token"
              return 0
            fi

            local prompt_file="prompts/05-fit-score-budget.md"
            if [[ "$procurement_type" == "intl-dev" ]]; then
              prompt_file="prompts/06-intl-dev-analysis.md"
            fi

            local system_prompt
            if [[ -f "$prompt_file" ]]; then
              system_prompt="$(cat "$prompt_file")"
            else
              system_prompt="You are a proposal-analysis assistant. Produce concise, client-ready markdown output with factual extraction and no invented details."
            fi

            local artifact_instruction
            case "$artifact" in
              analysis)
                artifact_instruction="Produce ONLY the analysis markdown file content for ${in_file##*/}. Include structured sections covering opportunity summary, requirements extraction, evaluation criteria, risks, and recommended actions. Return markdown only."
                ;;
              issues)
                artifact_instruction="Produce ONLY the issues markdown file content for ${in_file##*/}. Include prioritized BD issues with severity and actionable mitigations. Return markdown only."
                ;;
              executive-summary)
                artifact_instruction="Produce ONLY the executive-summary markdown file content for ${in_file##*/}. Include recommendation, fit score statement, strongest alignment, critical gap, top risks, and immediate actions. Return markdown only."
                ;;
              scorecard)
                artifact_instruction="Produce ONLY the scorecard markdown file content for ${in_file##*/}. Include an overall fit score line, category or dimension score table, and top 3 highest-priority BD issues. Return markdown only."
                ;;
              *)
                echo "fallback:unknown-artifact"
                return 0
                ;;
            esac

            local model endpoint
            model="${GITHUB_MODELS_CLAUDE_MODEL:-anthropic/claude-sonnet-4.5}"
            endpoint="${GITHUB_MODELS_ENDPOINT:-https://models.github.ai/inference/chat/completions}"

            local user_payload
            user_payload="${artifact_instruction}\n\nUse the full source markdown exactly as provided below, including metadata and the Submitted Company Profile section.\n\n--- BEGIN MARKDOWN ---\n$(cat \"$in_file\")\n--- END MARKDOWN ---"

            jq -n \
              --arg model "$model" \
              --arg system "$system_prompt" \
              --arg user "$user_payload" \
              '{
                model: $model,
                temperature: 0.1,
                messages: [
                  {role: "system", content: $system},
                  {role: "user", content: $user}
                ]
              }' > "$request_file"

            if ! curl --silent --show-error --fail-with-body \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -X POST "$endpoint" \
              --data @"$request_file" \
              -o "$raw_response_file"; then
              echo "fallback:request-failed"
              return 0
            fi

            local extracted
            extracted="$(jq -r 'if (.choices[0].message.content | type) == "string" then .choices[0].message.content else (.choices[0].message.content | map(select(type == "object") | .text // "") | join("")) end' "$raw_response_file" 2>/dev/null || true)"

            if [[ -z "${extracted//[[:space:]]/}" || "$extracted" == "null" ]]; then
              echo "fallback:empty-response"
              return 0
            fi

            local normalized
            normalized="$(printf '%s' "$extracted" | tr -d '\r' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
            if [[ "$normalized" == "$incomprehensible_marker" ]]; then
              echo "fallback:incomprehensible"
              return 0
            fi

            printf '%s\n' "$extracted" > "$out_file"

            if ! validate_stage_e_output "$artifact" "$out_file"; then
              echo "fallback:validation-failed"
              return 0
            fi

            echo "success:model=${model}"
            return 0
          }

          run_stage_e_overrides() {
            local final_file="$1"
            local stage_e_dir="$2"
            local stage_e_status_file="$3"

            mkdir -p "$stage_e_dir"

            local procurement_type_from_comment
            procurement_type_from_comment="$(detect_procurement_type_from_comment "$final_file")"
            if [[ -z "$procurement_type_from_comment" ]]; then
              jq -n \
                --arg status "fallback:missing-procurement-comment" \
                '{overallStatus: $status, procurementType: "", tokensEstimated: 0, artifacts: {analysis: $status, issues: $status, executiveSummary: $status, scorecard: $status}}' > "$stage_e_status_file"
              return 0
            fi

            local tokens_estimated
            tokens_estimated="$(estimate_tokens "$final_file")"
            local max_tokens
            max_tokens="${STAGE_E_MAX_INPUT_TOKENS:-100000}"
            if [[ "$tokens_estimated" -gt "$max_tokens" ]]; then
              jq -n \
                --arg status "fallback:token-limit" \
                --arg procurementType "$procurement_type_from_comment" \
                --argjson tokens "$tokens_estimated" \
                '{overallStatus: $status, procurementType: $procurementType, tokensEstimated: $tokens, artifacts: {analysis: $status, issues: $status, executiveSummary: $status, scorecard: $status}}' > "$stage_e_status_file"
              return 0
            fi

            local analysis_candidate="$stage_e_dir/output.analysis.md"
            local issues_candidate="$stage_e_dir/output.issues.md"
            local executive_candidate="$stage_e_dir/output.executive-summary.md"
            local scorecard_candidate="$stage_e_dir/output.scorecard.md"

            local analysis_status
            local issues_status
            local executive_status
            local scorecard_status

            analysis_status="$(stage_e_generate_artifact "$final_file" "$analysis_candidate" "$stage_e_dir/request.analysis.json" "$stage_e_dir/raw-response.analysis.json" "$procurement_type_from_comment" "analysis")"
            issues_status="$(stage_e_generate_artifact "$final_file" "$issues_candidate" "$stage_e_dir/request.issues.json" "$stage_e_dir/raw-response.issues.json" "$procurement_type_from_comment" "issues")"
            executive_status="$(stage_e_generate_artifact "$final_file" "$executive_candidate" "$stage_e_dir/request.executive-summary.json" "$stage_e_dir/raw-response.executive-summary.json" "$procurement_type_from_comment" "executive-summary")"
            scorecard_status="$(stage_e_generate_artifact "$final_file" "$scorecard_candidate" "$stage_e_dir/request.scorecard.json" "$stage_e_dir/raw-response.scorecard.json" "$procurement_type_from_comment" "scorecard")"

            local analysis_path="${final_file%.md}.analysis.md"
            local issues_path="${final_file%.md}.issues.md"
            local executive_path="${final_file%.md}.executive-summary.md"
            local scorecard_path="${final_file%.md}.scorecard.md"

            if [[ "$analysis_status" == success:* ]]; then
              cp "$analysis_candidate" "$analysis_path"
            fi
            if [[ "$issues_status" == success:* ]]; then
              cp "$issues_candidate" "$issues_path"
            fi
            if [[ "$executive_status" == success:* ]]; then
              cp "$executive_candidate" "$executive_path"
            fi
            if [[ "$scorecard_status" == success:* ]]; then
              cp "$scorecard_candidate" "$scorecard_path"
            fi

            local overall_status="fallback:all"
            if [[ "$analysis_status" == success:* && "$issues_status" == success:* && "$executive_status" == success:* && "$scorecard_status" == success:* ]]; then
              overall_status="success:all"
            elif [[ "$analysis_status" == success:* || "$issues_status" == success:* || "$executive_status" == success:* || "$scorecard_status" == success:* ]]; then
              overall_status="success:partial"
            fi

            jq -n \
              --arg overallStatus "$overall_status" \
              --arg procurementType "$procurement_type_from_comment" \
              --arg analysis "$analysis_status" \
              --arg issues "$issues_status" \
              --arg executiveSummary "$executive_status" \
              --arg scorecard "$scorecard_status" \
              --argjson tokens "$tokens_estimated" \
              '{
                overallStatus: $overallStatus,
                procurementType: $procurementType,
                tokensEstimated: $tokens,
                artifacts: {
                  analysis: $analysis,
                  issues: $issues,
                  executiveSummary: $executiveSummary,
                  scorecard: $scorecard
                }
              }' > "$stage_e_status_file"
          }

          detect_procurement_type() {
            local in_file="$1"
            local comment_type=""
            local profile_type=""
            local metadata_type=""
            local submission_id=""
            local metadata_file=""
            local profile_line=""
            local profile_value=""

            if [[ ! -f "$in_file" ]]; then
              echo "us-federal"
              return 0
            fi

            comment_type="$(head -n 5 "$in_file" | sed -n 's/^[[:space:]]*<!-- procurement-type: \(.*\) -->[[:space:]]*$/\1/p' | head -n 1 | tr '[:upper:]' '[:lower:]' | xargs)"
            if [[ "$comment_type" != "us-federal" && "$comment_type" != "intl-dev" && "$comment_type" != "other" ]]; then
              comment_type=""
            fi

            profile_line="$(grep -im1 '^\*\*Procurement Type:\*\*' "$in_file" || true)"
            profile_value="$(printf '%s\n' "$profile_line" | sed -E 's/^\*\*Procurement Type:\*\*[[:space:]]*//I' | tr '[:upper:]' '[:lower:]' | xargs)"
            case "$profile_value" in
              *international*development*|*intl*dev*)
                profile_type="intl-dev"
                ;;
              *us*federal*|*far*)
                profile_type="us-federal"
                ;;
              *other*|*commercial*)
                profile_type="other"
                ;;
            esac

            if [[ "$in_file" =~ /sub_[0-9]+/ ]]; then
              submission_id="$(printf '%s' "$in_file" | sed -n 's|.*\(sub_[0-9][0-9]*\).*|\1|p' | head -n 1)"
              metadata_file="rfp-pdfs/${submission_id}/submission-metadata.json"
              if [[ -f "$metadata_file" ]]; then
                metadata_type="$(jq -r '.procurementType // ""' "$metadata_file" 2>/dev/null | tr '[:upper:]' '[:lower:]' | xargs)"
                if [[ "$metadata_type" != "us-federal" && "$metadata_type" != "intl-dev" && "$metadata_type" != "other" ]]; then
                  metadata_type=""
                fi
              fi
            fi

            if [[ "$profile_type" == "intl-dev" || "$metadata_type" == "intl-dev" ]]; then
              echo "intl-dev"
            elif [[ -n "$profile_type" ]]; then
              echo "$profile_type"
            elif [[ -n "$comment_type" ]]; then
              echo "$comment_type"
            elif [[ -n "$metadata_type" ]]; then
              echo "$metadata_type"
            else
              echo "us-federal"
            fi
          }

          write_final_with_last_run() {
            local in_file="$1"
            local out_file="$2"
            local run_ts
            run_ts="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

            {
              echo "---"
              echo "last_run: \"${run_ts}\""
              echo "---"
              echo ""
              cat "$in_file"
            } > "$out_file"
          }

          if ! while IFS= read -r target; do
            [[ -z "$target" ]] && continue
            [[ ! -f "$target" ]] && continue

            target_rel="${target#rfp-markdown/generated/}"
            stem="$(basename "$target" .md)"
            target_base="${target_rel%.md}"
            case_dir="$RUN_DIR/$target_base"
            mkdir -p "$case_dir"

            cp "$target" "$case_dir/original.md"
            LAST_SUCCESS="$case_dir/original.md"
            echo "$LAST_SUCCESS" > "$RUN_DIR/last-success-artifact.txt"
            procurement_type="$(detect_procurement_type "$case_dir/original.md")"

            retry_limit="${MAX_REFINEMENT_RETRIES:-1}"
            if ! [[ "$retry_limit" =~ ^[0-9]+$ ]]; then
              retry_limit=1
            fi
            max_attempts=$((retry_limit + 1))
            attempt=1
            success=0
            : > "$case_dir/attempt-status.log"

            while [[ "$attempt" -le "$max_attempts" ]]; do
              attempt_dir="$case_dir/attempt-${attempt}"
              mkdir -p "$attempt_dir/stage-a" "$attempt_dir/stage-b" "$attempt_dir/stage-c" "$attempt_dir/stage-d" "$attempt_dir/stage-e"

              stage_a_md="$attempt_dir/stage-a/output.md"
              stage_b_md="$attempt_dir/stage-b/output.md"
              stage_c_md="$attempt_dir/stage-c/output.md"
              stage_d_md="$attempt_dir/stage-d/output.md"

              printf '{"mode":"local-transform","stage":"A","target":"%s","attempt":%s}\n' "$target" "$attempt" > "$attempt_dir/stage-a/request.json"
              transform_stage_a "$case_dir/original.md" "$stage_a_md"
              printf '{"message":"local deterministic transform completed for stage A"}\n' > "$attempt_dir/stage-a/raw-response.json"
              LAST_SUCCESS="$stage_a_md"
              echo "$LAST_SUCCESS" > "$RUN_DIR/last-success-artifact.txt"

              printf '{"mode":"local-transform","stage":"B","target":"%s","attempt":%s}\n' "$target" "$attempt" > "$attempt_dir/stage-b/request.json"
              transform_stage_b "$stage_a_md" "$stage_b_md"
              printf '{"message":"local deterministic transform completed for stage B"}\n' > "$attempt_dir/stage-b/raw-response.json"
              LAST_SUCCESS="$stage_b_md"
              echo "$LAST_SUCCESS" > "$RUN_DIR/last-success-artifact.txt"

              printf '{"mode":"local-transform","stage":"C","target":"%s","attempt":%s}\n' "$target" "$attempt" > "$attempt_dir/stage-c/request.json"
              transform_stage_c "$stage_b_md" "$stage_c_md"
              printf '{"message":"local deterministic transform completed for stage C"}\n' > "$attempt_dir/stage-c/raw-response.json"
              LAST_SUCCESS="$stage_c_md"
              echo "$LAST_SUCCESS" > "$RUN_DIR/last-success-artifact.txt"

              transform_stage_d_claude \
                "$stage_c_md" \
                "$stage_d_md" \
                "$attempt_dir/stage-d/request.json" \
                "$attempt_dir/stage-d/raw-response.json" \
                "$attempt_dir/stage-d/status.txt" \
                "$procurement_type"
              LAST_SUCCESS="$stage_d_md"
              echo "$LAST_SUCCESS" > "$RUN_DIR/last-success-artifact.txt"

              stage_d_status="$(cat "$attempt_dir/stage-d/status.txt")"
              echo "attempt-${attempt}: ${stage_d_status}" >> "$case_dir/attempt-status.log"

              if [[ "$stage_d_status" == incomprehensible:* ]]; then
                if [[ "$attempt" -lt "$max_attempts" ]]; then
                  attempt=$((attempt + 1))
                  continue
                fi
                echo "Pipeline failed after ${max_attempts} attempts for ${target}. Last status: ${stage_d_status}" > "$RUN_DIR/failure-summary.txt"
                exit 1
              fi

              final_out="rfp-markdown/generated/${target_base}-final.md"
              mkdir -p "$(dirname "$final_out")"
              write_final_with_last_run "$stage_d_md" "$final_out"

              python -m pdf_multi_agent_analysis.cli analyze-markdown \
                "$final_out" \
                --assets-dir assets \
                --out-dir "$(dirname "$final_out")"

              stage_e_status_file="$attempt_dir/stage-e/status.json"
              run_stage_e_overrides "$final_out" "$attempt_dir/stage-e" "$stage_e_status_file"
              stage_e_overall_status="$(jq -r '.overallStatus // "unknown"' "$stage_e_status_file" 2>/dev/null || echo "unknown")"

              python -m pdf_multi_agent_analysis.cli generate-capture-brief \
                "$final_out"

              LAST_SUCCESS="$final_out"
              echo "$LAST_SUCCESS" > "$RUN_DIR/last-success-artifact.txt"
              success=1
              break
            done

            if [[ "$success" -ne 1 ]]; then
              echo "Pipeline failed with unresolved retry state for ${target}." > "$RUN_DIR/failure-summary.txt"
              exit 1
            fi

            summary="$case_dir/run-summary.md"
            {
              echo '# Run Summary'
              echo ''
              echo "- target: $target"
              echo "- mode: local-transform"
              echo "- max_attempts: $max_attempts"
              echo "- final_attempt: $attempt"
              echo "- procurement_type: $procurement_type"
              echo "- stage_a_output: $stage_a_md"
              echo "- stage_b_output: $stage_b_md"
              echo "- stage_c_output: $stage_c_md"
              echo "- stage_d_output: $stage_d_md"
              echo "- stage_d_status: $stage_d_status"
              echo "- stage_e_status_file: $stage_e_status_file"
              echo "- stage_e_overall_status: $stage_e_overall_status"
              echo "- attempt_status_log: $case_dir/attempt-status.log"
              echo "- final_output: $final_out"
              echo "- last_success_artifact: $LAST_SUCCESS"
            } > "$summary"
          done < .tmp/targets.txt; then
            echo "Pipeline failed. Last successful artifact: $(cat "$RUN_DIR/last-success-artifact.txt")" > "$RUN_DIR/failure-summary.txt"
            exit 1
          fi

      - name: Prune generated outputs for missing source markdown
        if: steps.prep.outputs.target_count != '0'
        run: |
          set -euo pipefail

          while IFS= read -r final_md; do
            src="${final_md%-final.md}.md"

            if [[ ! -f "$src" ]]; then
              rm -f \
                "${final_md%-final.md}-final.md" \
                "${final_md%-final.md}-final.analysis.md" \
                "${final_md%-final.md}-final.issues.md" \
                "${final_md%-final.md}-final.scorecard.md" \
                "${final_md%-final.md}-final.executive-summary.md" \
                "${final_md%-final.md}-capture-brief.md" \
                "${final_md%-final.md}-capture-brief.validation.json" \
                "${final_md%-final.md}-capture-brief.status.json"
              echo "pruned generated set for missing source: $src"
            fi
          done < <(find rfp-markdown/generated -type f -name '*-final.md' | sort)

      - name: Snapshot generated outputs to LinkedIn archive
        if: steps.prep.outputs.target_count != '0'
        run: |
          set -euo pipefail

          RUN_TS="$(date -u +"%Y%m%dT%H%M%SZ")"
          SNAPSHOT_DIR="linkedin-series-archive/${RUN_TS}-run-${{ github.run_id }}-attempt-${{ github.run_attempt }}"
          mkdir -p "$SNAPSHOT_DIR"

          copied=0
          while IFS= read -r target; do
            [[ -z "$target" ]] && continue
            target_base="${target%.md}"

            for suffix in \
              "-final.md" \
              "-final.analysis.md" \
              "-final.issues.md" \
              "-final.scorecard.md" \
              "-final.executive-summary.md" \
              "-capture-brief.md"; do
              src="${target_base}${suffix}"
              if [[ -f "$src" ]]; then
                cp "$src" "$SNAPSHOT_DIR/"
                copied=$((copied + 1))
              fi
            done
          done < .tmp/targets.txt

          if [[ "$copied" -eq 0 ]]; then
            rmdir "$SNAPSHOT_DIR"
            echo "No generated files copied to LinkedIn archive."
            exit 0
          fi

          manifest="$SNAPSHOT_DIR/_snapshot-manifest.md"
          {
            echo "# LinkedIn snapshot manifest"
            echo ""
            echo "- created_utc: ${RUN_TS}"
            echo "- workflow_run_id: ${{ github.run_id }}"
            echo "- workflow_attempt: ${{ github.run_attempt }}"
            echo "- copied_files: ${copied}"
            echo ""
            echo "## Targets"
            while IFS= read -r target; do
              [[ -z "$target" ]] && continue
              echo "- ${target}"
            done < .tmp/targets.txt
          } > "$manifest"

          echo "LinkedIn snapshot created at ${SNAPSHOT_DIR} with ${copied} files."

      - name: Commit generated outputs when changed
        if: steps.prep.outputs.target_count != '0'
        run: |
          set -euo pipefail
          RUN_DIR="${{ steps.prep.outputs.run_dir }}"

          # Stage generated outputs and immutable LinkedIn snapshots.
          git add -A rfp-markdown/generated
          git add -A linkedin-series-archive

          if git diff --cached --quiet -- rfp-markdown/generated linkedin-series-archive; then
            echo "No generated markdown or LinkedIn archive changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git commit -m "chore(refinement): update generated markdown outputs"; then
            echo "Generated files unchanged at commit time."
            exit 0
          fi

          if ! git push; then
            manual="$RUN_DIR/manual-commit-instructions.md"
            {
              echo '# Manual Commit Required'
              echo ''
              echo 'Automated push failed (likely branch protection or token permissions).'
              echo ''
              echo 'Run these commands locally:'
              echo ''
              echo 'git checkout ${{ github.ref_name }}'
              echo 'git pull'
              echo 'git add rfp-markdown/generated linkedin-series-archive'
              echo 'git commit -m "chore(refinement): update generated markdown outputs"'
              echo 'git push'
            } > "$manual"
          fi

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: refinement-audit-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ steps.prep.outputs.run_dir }}
          if-no-files-found: warn

      - name: Fail with precise last-success message
        if: failure()
        run: |
          set -euo pipefail
          RUN_DIR="${{ steps.prep.outputs.run_dir }}"
          if [[ -f "$RUN_DIR/failure-summary.txt" ]]; then
            cat "$RUN_DIR/failure-summary.txt" >&2
          else
            echo "Pipeline failed before artifact tracking initialized." >&2
          fi
          exit 1
